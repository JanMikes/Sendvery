# docker-compose.yml
# Production: override env vars via .env.local or host environment variables
# Dev: defaults come from .env, override uses compose.override.yml

services:
  app:
    build: .
    depends_on:
      database:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sendvery.rule=Host(`sendvery.com`)"
      - "traefik.http.routers.sendvery.entrypoints=websecure"
      - "traefik.http.routers.sendvery.tls.certresolver=letsencrypt"
      - "traefik.http.services.sendvery.loadbalancer.server.port=80"
    networks:
      - traefik
      - default
    restart: unless-stopped

  worker:
    build: .
    command: php bin/console messenger:consume async --time-limit=3600
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build: .
    command: php bin/console messenger:consume scheduler_default --time-limit=3600
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: sendvery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d sendvery"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default

volumes:
  pgdata:

networks:
  traefik:
    external: true
