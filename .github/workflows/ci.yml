name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sendvery
          POSTGRES_PASSWORD: sendvery
          POSTGRES_DB: sendvery_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, intl, sodium
          coverage: pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://sendvery:sendvery@localhost:5432/sendvery_test
        run: bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run PHPUnit
        env:
          DATABASE_URL: postgresql://sendvery:sendvery@localhost:5432/sendvery_test
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

  phpstan:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, intl, sodium

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan --memory-limit=-1 analyse

  cs-check:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes
